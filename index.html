<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tasks</title>
    <style>
        :root {
            --turquoise-dark: #2ab7a9;
            --turquoise: #40e0d0;
            --turquoise-light: #7fece0;
            --turquoise-pale: #b2f5ed;
            --turquoise-bg: #e6faf8;
            --brown-dark: #5c2e0a;
            --brown: #8b4513;
            --brown-light: #a0522d;
            --brown-pale: #d2a679;
            --white: #ffffff;
            --shadow: rgba(139, 69, 19, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background-color: var(--turquoise-bg);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 2rem;
            color: var(--brown-dark);
            margin-bottom: 0.25rem;
        }

        header h1 span {
            color: var(--turquoise-dark);
        }

        header p {
            color: var(--brown-light);
            font-size: 0.95rem;
        }

        .add-task-form {
            display: flex;
            gap: 0.5rem;
            max-width: 500px;
            margin: 0 auto 2rem;
        }

        .add-task-form input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 2px solid var(--turquoise);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .add-task-form input:focus {
            border-color: var(--brown-light);
        }

        .add-task-form input::placeholder {
            color: var(--brown-pale);
        }

        .add-task-form button {
            padding: 0.75rem 1.5rem;
            background-color: var(--brown);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        .add-task-form button:hover {
            background-color: var(--brown-dark);
        }

        .add-task-form button:active {
            transform: scale(0.96);
        }

        .task-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
        }

        .task-card {
            background: var(--white);
            border-radius: 12px;
            padding: 1.25rem;
            box-shadow: 0 2px 8px var(--shadow);
            border-left: 4px solid var(--turquoise);
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            transition: box-shadow 0.2s, transform 0.2s;
        }

        .task-card:hover {
            box-shadow: 0 4px 16px var(--shadow);
            transform: translateY(-2px);
        }

        .task-card .task-title {
            font-size: 1.05rem;
            color: var(--brown-dark);
            word-break: break-word;
            flex: 1;
        }

        .task-card .task-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }

        .task-card .task-actions button {
            padding: 0.4rem 0.7rem;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .task-card .task-actions button:active {
            transform: scale(0.93);
        }

        .btn-edit {
            background-color: var(--turquoise-pale);
            color: var(--brown-dark);
        }

        .btn-edit:hover {
            background-color: var(--turquoise-light);
        }

        .btn-delete {
            background-color: #fde8e8;
            color: #b91c1c;
        }

        .btn-delete:hover {
            background-color: #fca5a5;
        }

        .task-card .edit-input {
            width: 100%;
            padding: 0.5rem 0.6rem;
            border: 2px solid var(--turquoise);
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
        }

        .task-card .edit-input:focus {
            border-color: var(--brown-light);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--brown-light);
        }

        .empty-state .emoji {
            font-size: 3rem;
            margin-bottom: 0.75rem;
        }

        .empty-state p {
            font-size: 1.1rem;
        }

        @media (max-width: 400px) {
            .add-task-form {
                flex-direction: column;
            }

            .task-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🗂️ <span>My</span> Tasks</h1>
            <p>Stay organized, one task at a time</p>
        </header>

        <form class="add-task-form" id="addTaskForm" aria-label="Add a new task">
            <input
                type="text"
                id="taskInput"
                placeholder="Enter a task title..."
                aria-label="Task title"
                autocomplete="off"
            >
            <button type="submit">+ Add</button>
        </form>

        <main id="taskContainer" aria-live="polite">
            <!-- Tasks rendered here by JS -->
        </main>
    </div>

    <script>
        const STORAGE_KEY = 'task-manager-tasks';
        const taskContainer = document.getElementById('taskContainer');
        const addTaskForm = document.getElementById('addTaskForm');
        const taskInput = document.getElementById('taskInput');

        // --- State ---
        let tasks = loadTasks();

        // --- Persistence ---
        function loadTasks() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : [];
            } catch {
                return [];
            }
        }

        function saveTasks() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
        }

        // --- Rendering ---
        function render() {
            if (tasks.length === 0) {
                taskContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="emoji">📋</div>
                        <p>No tasks yet — add one!</p>
                    </div>
                `;
                return;
            }

            taskContainer.innerHTML = `<div class="task-grid">${tasks.map(task => `
                <div class="task-card" data-id="${task.id}">
                    <span class="task-title">${escapeHtml(task.title)}</span>
                    <div class="task-actions">
                        <button class="btn-edit" onclick="startEdit('${task.id}')" aria-label="Edit task">✏️ Edit</button>
                        <button class="btn-delete" onclick="deleteTask('${task.id}')" aria-label="Delete task">🗑️ Delete</button>
                    </div>
                </div>
            `).join('')}</div>`;
        }

        // --- Add Task ---
        addTaskForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const title = taskInput.value.trim();
            if (!title) return;

            const task = {
                id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
                title: title,
                createdAt: new Date().toISOString()
            };

            tasks.unshift(task);
            saveTasks();
            render();
            taskInput.value = '';
            taskInput.focus();
        });

        // --- Delete Task ---
        function deleteTask(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;

            const confirmed = confirm(`Delete task "${task.title}"?`);
            if (!confirmed) return;

            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            render();
        }

        // --- Inline Edit ---
        function startEdit(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;

            const card = taskContainer.querySelector(`.task-card[data-id="${id}"]`);
            if (!card) return;

            const titleEl = card.querySelector('.task-title');
            const actionsEl = card.querySelector('.task-actions');

            // Replace title with input
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'edit-input';
            input.value = task.title;
            input.setAttribute('aria-label', 'Edit task title');

            titleEl.replaceWith(input);
            actionsEl.style.display = 'none';
            input.focus();
            input.select();

            function saveEdit() {
                const newTitle = input.value.trim();
                if (newTitle && newTitle !== task.title) {
                    task.title = newTitle;
                    saveTasks();
                }
                render();
            }

            function cancelEdit() {
                render();
            }

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    saveEdit();
                } else if (e.key === 'Escape') {
                    cancelEdit();
                }
            });

            input.addEventListener('blur', () => {
                saveEdit();
            });
        }

        // --- Utilities ---
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // --- Initial render ---
        render();
    </script>
</body>
</html>
